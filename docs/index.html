<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Social Icons Demo</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
  /* Container principale */
  .social-container {
    width: 75%;
    margin: 10vh auto;
    text-align: center;
  }

  /* Lista icone social */
  .social-icons {
    list-style: none;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 0;
    margin-top: 1em;
  }

  /* Singolo elemento lista */
  .social-icons li {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative; /* per posizionare sfondo */
  }

  /* Link che contiene l'icona */
  .social-icons a {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    text-decoration: none;
    color: white; /* icona bianca di default */
  }

  /* Cerchio colorato dietro l'icona */
  .social-icons a::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: var(--circle-color, #000); /* colore dinamico */
    z-index: 1;
    transition: transform 265ms ease-out;
  }

  /* Icona */
  .social-icons i {
    font-size: 1.5em;
    color: white;
    z-index: 2;
    transition: transform 265ms ease-out, color 265ms ease-out;
  }

  /* Hover: sfondo si nasconde */
  .social-icons a:hover::before {
    transform: scale(0);
  }

  /* Hover: icona cresce e cambia colore al brand */
  .social-icons a:hover i {
    transform: scale(2.2);
    color: var(--icon-color, #000);
  }

  /* Modalità scura (opzionale) */
  body.dark-mode {
    background-color: #121212;
    color: #f0f0f0;
  }

</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙 Modalità Scura</button>

<div class="social-container">
  <p class="lead">Per restare aggiornato sullo sviluppo seguici sui social</p>

  <ul class="social-icons">
    <li data-platform="instagram"><a href="https://www.instagram.com/YOUR_ID/" aria-label="Instagram"><i class="fab fa-instagram"></i></a></li>
    <li data-platform="youtube"><a href="https://www.youtube.com/@YOUR_ID/" aria-label="YouTube"><i class="fab fa-youtube"></i></a></li>
    <li data-platform="discord"><a href="https://discord.gg/YOUR_INVITE_ID" aria-label="Discord"><i class="fab fa-discord"></i></a></li>
    <li data-platform="github"><a href="https://www.github.com/YOUR_ID/" aria-label="GitHub"><i class="fab fa-github"></i></a></li>
    <li data-platform="facebook"><a href="https://www.facebook.com/YOUR_ID" aria-label="Facebook"><i class="fab fa-facebook"></i></a></li>
    <li data-platform="twitter"><a href="https://x.com/YOUR_ID" aria-label="X"><i class="fab fa-x-twitter"></i></a></li>
    <li data-platform="linkedin"><a href="https://www.linkedin.com/in/YOUR_ID/" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a></li>
    <li data-platform="TikTok"><a href="https://www.tiktok.com/@YOUR_ID" aria-label="TikTok"><i class="fab fa-tiktok"></i></a></li>
  </ul>
</div>

<script src="script.js" defer></script>

</body>
</html>
